name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      ContinuousIntegrationBuild: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore --locked-mode
      - run: dotnet build --no-restore --configuration Release -warnaserror
      - run: dotnet test --no-build --configuration Release --logger trx --results-directory TestResults
      - name: Vulnerability scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -E '(Critical|High)' vuln.txt; then
            echo "Vulnerable packages found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults

  e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore --locked-mode
      - run: dotnet test EntraMcpProxy.E2ETests --configuration Release --logger trx
        # TODO: Remove continue-on-error once the E2E project exists (Task 1.5)
        continue-on-error: true  # E2E project doesn't exist yet — created in Task 1.5

  sbom:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
